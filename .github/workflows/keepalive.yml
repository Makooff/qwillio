name: Neon Keepalive

# Pings the warmup endpoint to keep Neon DB hot 24/7.
# Replaces the Vercel cron (which required Pro plan for sub-daily schedules).
# GitHub Actions min schedule is 5min and may be delayed by GH under load,
# which is fine — Neon stays warm for ~5min after last query.

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping warmup
        run: |
          curl -fsS --max-time 60 --retry 2 --retry-delay 5 \
            https://qwillio.onrender.com/api/auth/warmup \
            -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n"
