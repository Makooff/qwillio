    <!-- ═══ Schema.org JSON-LD – Organization ═══ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Qwillio",
      "url": "https://qwillio.com",
      "logo": "https://qwillio.com/favicon.svg",
      "description": "AI-powered receptionist and business automation platform. Answers calls, books appointments, manages CRM, billing, and follow-ups 24/7.",
      "sameAs": [],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "url": "https://qwillio.com/contact",
        "availableLanguage": ["English", "French"]
      },
      "offers": {
        "@type": "AggregateOffer",
        "priceCurrency": "USD",
        "lowPrice": "497",
        "highPrice": "2497",
        "offerCount": "3"
      }
    }
    </script>

    <!-- ═══ Schema.org JSON-LD – SoftwareApplication ═══ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Qwillio",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web, iOS, Android",
      "url": "https://qwillio.com",
      "description": "AI receptionist that answers calls, books appointments, manages CRM and billing automatically.",
      "offers": {
        "@type": "Offer",
        "price": "497",
        "priceCurrency": "USD",

      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "reviewCount": "128"
      }
    }
    </script>

    <!-- ═══ Schema.org JSON-LD – FAQPage ═══ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Qwillio?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Qwillio is an AI-powered receptionist that answers your business calls 24/7, books appointments, sends follow-up SMS, and manages your CRM automatically."
          }
        },
        {
          "@type": "Question",
          "name": "How much does Qwillio cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Qwillio starts at $497/month for the Starter plan with 800 calls included. The first month is free with no setup fee."
          }
        },
        {
          "@type": "Question",
          "name": "Does Qwillio work in French?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! Qwillio is fully bilingual. Ashley handles English calls and Marie handles French calls, both powered by advanced AI."
          }
        },
        {
          "@type": "Question",
          "name": "Is there a free trial?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, your first month is completely free with no setup fee and no credit card required to start."
          }
        }
      ]
    }
    </script>
