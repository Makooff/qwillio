<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- V3-01: NEON - Q lumineux néon sur fond sombre -->
  <defs>
    <filter id="neon">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="10" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" rx="30" fill="#0f0a2a"/>
  <!-- Q néon -->
  <circle cx="190" cy="160" r="80" fill="none" stroke="#a78bfa" stroke-width="6" filter="url(#neon)"/>
  <line x1="247" y1="217" x2="290" y2="260" stroke="#a78bfa" stroke-width="6" stroke-linecap="round" filter="url(#neon)"/>
  <!-- Wordmark néon -->
  <text x="200" y="345" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="46" font-weight="300" fill="#c4b5fd" letter-spacing="8" filter="url(#neon)">Qwillio</text>
</svg>