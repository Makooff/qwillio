<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- 14: LIGHTNING BOLT — Éclair stylisé (vitesse, automatisation, énergie) -->
  <defs>
    <linearGradient id="n1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eab308"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="n_gl">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Cercle fond sombre -->
  <circle cx="200" cy="155" r="110" fill="#1c1917"/>
  <!-- Éclair -->
  <polygon points="215,45 155,165 195,165 175,275 260,135 215,135 245,45" fill="url(#n1)" filter="url(#n_gl)"/>
  <!-- Reflet sur l'éclair -->
  <polygon points="220,55 175,155 195,155 188,200 240,140 218,140 240,55" fill="white" opacity="0.12"/>
  <!-- Wordmark -->
  <text x="200" y="340" text-anchor="middle" font-family="'Trebuchet MS', sans-serif" font-size="52" font-weight="700" fill="#1c1917" letter-spacing="2">Qwillio</text>
  <text x="200" y="370" text-anchor="middle" font-family="'Trebuchet MS', sans-serif" font-size="11" fill="#d97706" letter-spacing="6">INSTANT RESPONSE</text>
</svg>