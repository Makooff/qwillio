<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Double Bubble - Icon only -->
  <defs>
    <linearGradient id="bia" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488"/><stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="bib" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0891b2"/><stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- Left bubble -->
  <ellipse cx="78" cy="80" rx="55" ry="46" fill="url(#bia)"/>
  <polygon points="55,118 42,148 82,112" fill="url(#bia)"/>
  <!-- Audio bars -->
  <line x1="55" y1="68" x2="55" y2="92" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <line x1="67" y1="62" x2="67" y2="98" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="79" y1="66" x2="79" y2="94" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <line x1="91" y1="70" x2="91" y2="90" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <!-- Right bubble -->
  <ellipse cx="125" cy="72" rx="50" ry="42" fill="url(#bib)" opacity="0.8"/>
  <polygon points="148,104 165,130 132,100" fill="url(#bib)" opacity="0.8"/>
  <!-- Dots -->
  <circle cx="110" cy="72" r="4" fill="white" opacity="0.8"/>
  <circle cx="125" cy="72" r="4" fill="white" opacity="0.8"/>
  <circle cx="140" cy="72" r="4" fill="white" opacity="0.8"/>
</svg>