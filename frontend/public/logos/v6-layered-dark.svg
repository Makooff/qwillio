<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Layered - Dark mode -->
  <rect width="400" height="400" rx="20" fill="#0f172a"/>
  <defs>
    <linearGradient id="ld1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c7d2fe"/><stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
    <linearGradient id="ld2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/><stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="ld3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <filter id="ldgl">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#ldgl)">
    <circle cx="225" cy="105" r="62" fill="none" stroke="url(#ld1)" stroke-width="8" opacity="0.6"/>
    <line x1="269" y1="149" x2="298" y2="178" stroke="url(#ld1)" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
    <circle cx="200" cy="140" r="62" fill="none" stroke="url(#ld2)" stroke-width="8" opacity="0.8"/>
    <line x1="244" y1="184" x2="273" y2="213" stroke="url(#ld2)" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
    <circle cx="175" cy="175" r="62" fill="none" stroke="url(#ld3)" stroke-width="8"/>
    <line x1="219" y1="219" x2="248" y2="248" stroke="url(#ld3)" stroke-width="8" stroke-linecap="round"/>
  </g>
  <text x="200" y="330" text-anchor="middle" font-family="'Trebuchet MS', sans-serif" font-size="46" font-weight="700" fill="#e0e7ff" letter-spacing="3">Qwillio</text>
  <text x="200" y="362" text-anchor="middle" font-family="'Trebuchet MS', sans-serif" font-size="11" fill="#818cf8" letter-spacing="6">AI RECEPTIONIST</text>
</svg>