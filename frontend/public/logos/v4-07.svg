<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- 07: GLASS SPHERE — 3D frosted glass sphere with Q inside -->
  <defs>
    <radialGradient id="v407a" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="40%" stop-color="#7dd3fc"/>
      <stop offset="80%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </radialGradient>
    <radialGradient id="v407b" cx="30%" cy="25%" r="35%">
      <stop offset="0%" stop-color="white" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <filter id="v407shadow">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#0c4a6e" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- Shadow ellipse -->
  <ellipse cx="200" cy="310" rx="75" ry="12" fill="#0c4a6e" opacity="0.12"/>
  <!-- Sphere -->
  <circle cx="195" cy="168" r="110" fill="url(#v407a)" filter="url(#v407shadow)"/>
  <!-- Glass highlight -->
  <ellipse cx="168" cy="128" rx="45" ry="32" fill="url(#v407b)" transform="rotate(-20, 168, 128)"/>
  <!-- Q inside the sphere -->
  <circle cx="195" cy="172" r="50" fill="none" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.85"/>
  <line x1="230" y1="207" x2="258" y2="235" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.85"/>
  <!-- Wordmark -->
  <text x="200" y="365" text-anchor="middle" font-family="'Palatino Linotype', 'Book Antiqua', serif" font-size="44" font-weight="400" fill="#0c4a6e" letter-spacing="5">Qwillio</text>
</svg>