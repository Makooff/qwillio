<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Logo 8: Q abstrait avec cercles superposés -->
  <defs>
    <linearGradient id="g8a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="g8b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  <!-- Cercle principal (corps du Q) -->
  <circle cx="175" cy="155" r="95" fill="url(#g8a)"/>
  <!-- Cercle secondaire superposé (crée l'effet abstrait) -->
  <circle cx="230" cy="200" r="70" fill="url(#g8b)"/>
  <!-- Espace négatif central -->
  <circle cx="185" cy="165" r="40" fill="white"/>
  <!-- Queue du Q -->
  <rect x="245" y="230" width="70" height="24" rx="12" fill="url(#g8a)" transform="rotate(-40, 280, 242)"/>
  <!-- Texte -->
  <text x="200" y="345" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="48" font-weight="700" fill="#1e1b4b" letter-spacing="4">Qwillio</text>
  <text x="200" y="375" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b5cf6" letter-spacing="6">SMART VOICE AI</text>
</svg>