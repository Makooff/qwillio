<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Connect Dots - Icon only -->
  <defs>
    <radialGradient id="dih" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2dd4bf"/><stop offset="100%" stop-color="#0d9488"/>
    </radialGradient>
  </defs>
  <!-- Connection lines -->
  <line x1="100" y1="100" x2="50" y2="40" stroke="#14b8a6" stroke-width="2.5" opacity="0.5"/>
  <line x1="100" y1="100" x2="150" y2="35" stroke="#14b8a6" stroke-width="2.5" opacity="0.5"/>
  <line x1="100" y1="100" x2="35" y2="100" stroke="#14b8a6" stroke-width="2.5" opacity="0.5"/>
  <line x1="100" y1="100" x2="165" y2="105" stroke="#14b8a6" stroke-width="2.5" opacity="0.5"/>
  <line x1="100" y1="100" x2="55" y2="155" stroke="#14b8a6" stroke-width="2.5" opacity="0.5"/>
  <line x1="100" y1="100" x2="150" y2="160" stroke="#14b8a6" stroke-width="2.5" opacity="0.5"/>
  <line x1="100" y1="100" x2="100" y2="170" stroke="#14b8a6" stroke-width="2.5" opacity="0.5"/>
  <line x1="100" y1="100" x2="30" y2="140" stroke="#14b8a6" stroke-width="2.5" opacity="0.5"/>
  <!-- Outer nodes -->
  <circle cx="50" cy="40" r="10" fill="#5eead4" opacity="0.7"/>
  <circle cx="150" cy="35" r="12" fill="#2dd4bf" opacity="0.8"/>
  <circle cx="35" cy="100" r="9" fill="#14b8a6" opacity="0.6"/>
  <circle cx="165" cy="105" r="11" fill="#0d9488" opacity="0.7"/>
  <circle cx="55" cy="155" r="10" fill="#2dd4bf" opacity="0.7"/>
  <circle cx="150" cy="160" r="8" fill="#14b8a6" opacity="0.6"/>
  <circle cx="100" cy="170" r="9" fill="#5eead4" opacity="0.5"/>
  <circle cx="30" cy="140" r="7" fill="#0d9488" opacity="0.5"/>
  <!-- Hub -->
  <circle cx="100" cy="100" r="20" fill="url(#dih)"/>
  <circle cx="100" cy="100" r="8" fill="white" opacity="0.9"/>
</svg>