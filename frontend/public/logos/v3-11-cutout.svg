<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- V3-11: CUTOUT - Q découpé dans un rectangle -->
  <defs>
    <mask id="cutmask">
      <rect width="400" height="320" fill="white"/>
      <!-- Découpe du Q -->
      <circle cx="185" cy="155" r="85" fill="black"/>
      <circle cx="185" cy="155" r="40" fill="white"/>
      <line x1="250" y1="220" x2="295" y2="265" stroke="black" stroke-width="30" stroke-linecap="round"/>
    </mask>
  </defs>
  <!-- Rectangle avec le Q découpé -->
  <rect x="40" y="20" width="320" height="280" rx="24" fill="#4f46e5" mask="url(#cutmask)"/>
  <!-- Wordmark -->
  <text x="200" y="365" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="48" font-weight="800" fill="#4f46e5" letter-spacing="4">Qwillio</text>
</svg>