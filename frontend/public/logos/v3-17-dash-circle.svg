<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- V3-17: DASH CIRCLE - Q en tirets/pointillés -->
  <defs>
    <linearGradient id="dc1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Q en pointillés (dash) -->
  <circle cx="190" cy="160" r="95" fill="none" stroke="url(#dc1)" stroke-width="18" stroke-linecap="round" stroke-dasharray="30 18"/>
  <!-- Centre plein -->
  <circle cx="190" cy="160" r="35" fill="url(#dc1)" opacity="0.15"/>
  <!-- Petit Q au centre -->
  <circle cx="190" cy="160" r="20" fill="none" stroke="url(#dc1)" stroke-width="5" stroke-linecap="round"/>
  <line x1="204" y1="174" x2="215" y2="185" stroke="url(#dc1)" stroke-width="5" stroke-linecap="round"/>
  <!-- Queue du Q principal -->
  <line x1="257" y1="227" x2="302" y2="272" stroke="url(#dc1)" stroke-width="18" stroke-linecap="round"/>
  <!-- Wordmark -->
  <text x="200" y="358" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="46" font-weight="600" fill="#1e1b4b" letter-spacing="5">Qwillio</text>
</svg>