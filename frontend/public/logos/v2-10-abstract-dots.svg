<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- V2-10: Abstract Dots - Q formé par un cercle plein + cercle secondaire + points orbitaux -->
  <defs>
    <linearGradient id="v10a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5" />
      <stop offset="100%" style="stop-color:#7c3aed" />
    </linearGradient>
    <radialGradient id="v10r" cx="35%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#818cf8" />
      <stop offset="100%" style="stop-color:#4338ca" />
    </radialGradient>
  </defs>
  <!-- Cercle principal du Q -->
  <circle cx="185" cy="155" r="90" fill="url(#v10r)"/>
  <!-- Cercle secondaire décalé -->
  <circle cx="240" cy="200" r="48" fill="#a855f7" opacity="0.4"/>
  <!-- Trou du Q -->
  <circle cx="190" cy="160" r="38" fill="white"/>
  <!-- Queue du Q : (185+90*0.707, 155+90*0.707) = (249, 219) -->
  <line x1="249" y1="219" x2="296" y2="266" stroke="url(#v10a)" stroke-width="22" stroke-linecap="round"/>
  <!-- Points orbitaux autour du Q (data / AI / connectivité) -->
  <circle cx="130" cy="80" r="7" fill="#6366f1" opacity="0.6"/>
  <circle cx="95" cy="155" r="5" fill="#818cf8" opacity="0.5"/>
  <circle cx="120" cy="230" r="6" fill="#a78bfa" opacity="0.4"/>
  <circle cx="280" cy="95" r="5" fill="#8b5cf6" opacity="0.5"/>
  <circle cx="305" cy="155" r="6" fill="#a78bfa" opacity="0.45"/>
  <circle cx="310" cy="230" r="4" fill="#c084fc" opacity="0.35"/>
  <!-- Lignes de connexion subtiles -->
  <line x1="130" y1="80" x2="150" y2="100" stroke="#6366f1" stroke-width="1.5" opacity="0.2"/>
  <line x1="280" y1="95" x2="260" y2="110" stroke="#8b5cf6" stroke-width="1.5" opacity="0.2"/>
  <line x1="305" y1="155" x2="278" y2="155" stroke="#a78bfa" stroke-width="1.5" opacity="0.15"/>
  <!-- Wordmark -->
  <text x="200" y="348" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="48" font-weight="700" fill="#1e1b4b" letter-spacing="3">Qwillio</text>
  <text x="200" y="378" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600" fill="#6366f1" letter-spacing="6">VOICE AI PLATFORM</text>
</svg>