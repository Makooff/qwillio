<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- V3-20: INFINITY - Q intégré dans un symbole infini -->
  <defs>
    <linearGradient id="inf1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="inf2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>
  <!-- Symbole infini -->
  <path d="M200 140 C230 100 310 80 330 140 C350 200 280 220 200 180 C120 220 50 200 70 140 C90 80 170 100 200 140" fill="none" stroke="url(#inf1)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Q subtil dans la boucle gauche -->
  <circle cx="130" cy="150" r="28" fill="url(#inf2)" opacity="0.2"/>
  <text x="130" y="160" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="30" font-weight="800" fill="url(#inf2)" opacity="0.5">Q</text>
  <!-- Queue du Q qui sort de l'infini -->
  <line x1="280" y1="195" x2="315" y2="230" stroke="url(#inf2)" stroke-width="14" stroke-linecap="round"/>
  <!-- Wordmark -->
  <text x="200" y="330" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="50" font-weight="700" fill="#1e1b4b" letter-spacing="3">Qwillio</text>
  <!-- Tagline -->
  <text x="200" y="365" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="600" fill="#6366f1" letter-spacing="7">INFINITE CONVERSATIONS</text>
</svg>