<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- V2-08: Q Minimal Shadow - Double Q décalé créant une ombre portée -->
  <defs>
    <linearGradient id="v8g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5" />
      <stop offset="100%" style="stop-color:#6366f1" />
    </linearGradient>
  </defs>
  <!-- Ombre (Q décalé en arrière-plan) -->
  <circle cx="200" cy="168" r="98" fill="#c7d2fe"/>
  <circle cx="200" cy="168" r="45" fill="white"/>
  <line x1="268" y1="237" x2="312" y2="281" stroke="#c7d2fe" stroke-width="26" stroke-linecap="round"/>
  <!-- Q principal (par-dessus) -->
  <circle cx="188" cy="156" r="98" fill="url(#v8g)"/>
  <circle cx="188" cy="156" r="45" fill="white"/>
  <!-- Queue du Q : (188+98*0.707, 156+98*0.707) = (257, 225) -->
  <line x1="257" y1="225" x2="302" y2="270" stroke="url(#v8g)" stroke-width="26" stroke-linecap="round"/>
  <!-- Wordmark -->
  <text x="200" y="355" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="48" font-weight="700" fill="#1e1b4b" letter-spacing="4">Qwillio</text>
</svg>