  <circle cx="160" cy="100" r="5" fill="#dc2626"/>
  <circle cx="160" cy="100" r="10" fill="#dc2626" opacity="0.15"/>
  <!-- Wordmark -->
  <text x="200" y="290" text-anchor="middle" font-family="'Trebuchet MS', sans-serif" font-size="56" font-weight="700" fill="#7f1d1d" letter-spacing="2">Qwillio</text>
  <text x="200" y="322" text-anchor="middle" font-family="'Trebuchet MS', sans-serif" font-size="11" fill="#dc2626" letter-spacing="6">ALWAYS ALIVE</text>
</svg>