<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- 10: ROBOT FACE — Visage de robot/assistant amical et minimaliste -->
  <defs>
    <linearGradient id="j1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <!-- Tête du robot (rectangle arrondi) -->
  <rect x="105" y="55" width="190" height="175" rx="40" fill="url(#j1)"/>
  <!-- Antenne -->
  <line x1="200" y1="55" x2="200" y2="30" stroke="url(#j1)" stroke-width="6" stroke-linecap="round"/>
  <circle cx="200" cy="22" r="8" fill="#818cf8"/>
  <!-- Yeux (LED amicales) -->
  <circle cx="158" cy="130" r="18" fill="white"/>
  <circle cx="158" cy="130" r="9" fill="#1e1b4b"/>
  <circle cx="155" cy="127" r="3" fill="white"/>
  <circle cx="242" cy="130" r="18" fill="white"/>
  <circle cx="242" cy="130" r="9" fill="#1e1b4b"/>
  <circle cx="239" cy="127" r="3" fill="white"/>
  <!-- Bouche (sourire LED) -->
  <path d="M168 185 Q200 210 232 185" fill="none" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <!-- Oreilles/écouteurs -->
  <rect x="80" y="115" width="28" height="48" rx="10" fill="#4f46e5"/>
  <rect x="292" y="115" width="28" height="48" rx="10" fill="#4f46e5"/>
  <!-- Ondes sortant des oreilles -->
  <path d="M75 125 C65 132 65 148 75 155" fill="none" stroke="#a5b4fc" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <path d="M325 125 C335 132 335 148 325 155" fill="none" stroke="#a5b4fc" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <!-- Wordmark -->
  <text x="200" y="315" text-anchor="middle" font-family="'Trebuchet MS', sans-serif" font-size="50" font-weight="700" fill="#312e81" letter-spacing="2">Qwillio</text>
  <text x="200" y="348" text-anchor="middle" font-family="'Trebuchet MS', sans-serif" font-size="11" fill="#6366f1" letter-spacing="6">AI ASSISTANT</text>
</svg>