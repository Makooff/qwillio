<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- V2-01: Q Minimal Bold - Cercle plein, trou central, queue correcte, wordmark bold -->
  <defs>
    <linearGradient id="v1g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5" />
      <stop offset="100%" style="stop-color:#7c3aed" />
    </linearGradient>
  </defs>
  <!-- Corps du Q : cercle plein -->
  <circle cx="190" cy="160" r="105" fill="url(#v1g)"/>
  <!-- Trou central -->
  <circle cx="190" cy="160" r="50" fill="white"/>
  <!-- Queue du Q : ligne partant du bord bas-droit (190+105*0.707, 160+105*0.707) = (264, 234) -->
  <line x1="264" y1="234" x2="310" y2="280" stroke="url(#v1g)" stroke-width="32" stroke-linecap="round"/>
  <!-- Wordmark bold -->
  <text x="200" y="360" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="52" font-weight="800" fill="#1e1b4b" letter-spacing="5">Qwillio</text>
</svg>