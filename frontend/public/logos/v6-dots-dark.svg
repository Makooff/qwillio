<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Connect Dots - Dark mode -->
  <rect width="400" height="400" rx="20" fill="#0f172a"/>
  <defs>
    <radialGradient id="ddh" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5eead4"/><stop offset="100%" stop-color="#14b8a6"/>
    </radialGradient>
    <filter id="ddgl">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#ddgl)">
    <!-- Lines -->
    <line x1="200" y1="165" x2="110" y2="80" stroke="#2dd4bf" stroke-width="2.5" opacity="0.4"/>
    <line x1="200" y1="165" x2="290" y2="75" stroke="#2dd4bf" stroke-width="2.5" opacity="0.4"/>
    <line x1="200" y1="165" x2="80" y2="170" stroke="#2dd4bf" stroke-width="2.5" opacity="0.4"/>
    <line x1="200" y1="165" x2="320" y2="175" stroke="#2dd4bf" stroke-width="2.5" opacity="0.4"/>
    <line x1="200" y1="165" x2="120" y2="248" stroke="#2dd4bf" stroke-width="2.5" opacity="0.4"/>
    <line x1="200" y1="165" x2="280" y2="255" stroke="#2dd4bf" stroke-width="2.5" opacity="0.4"/>
    <line x1="200" y1="165" x2="200" y2="270" stroke="#2dd4bf" stroke-width="2.5" opacity="0.4"/>
    <line x1="200" y1="165" x2="70" y2="230" stroke="#2dd4bf" stroke-width="2.5" opacity="0.4"/>
    <!-- Outer nodes -->
    <circle cx="110" cy="80" r="14" fill="#5eead4" opacity="0.7"/>
    <circle cx="290" cy="75" r="16" fill="#2dd4bf" opacity="0.8"/>
    <circle cx="80" cy="170" r="12" fill="#14b8a6" opacity="0.6"/>
    <circle cx="320" cy="175" r="14" fill="#0d9488" opacity="0.7"/>
    <circle cx="120" cy="248" r="13" fill="#2dd4bf" opacity="0.7"/>
    <circle cx="280" cy="255" r="11" fill="#14b8a6" opacity="0.6"/>
    <circle cx="200" cy="270" r="12" fill="#5eead4" opacity="0.5"/>
    <circle cx="70" cy="230" r="10" fill="#0d9488" opacity="0.5"/>
    <!-- Hub -->
    <circle cx="200" cy="165" r="28" fill="url(#ddh)"/>
    <circle cx="200" cy="165" r="10" fill="white" opacity="0.9"/>
  </g>
  <text x="200" y="335" text-anchor="middle" font-family="'Trebuchet MS', sans-serif" font-size="46" font-weight="700" fill="#ccfbf1" letter-spacing="3">Qwillio</text>
  <text x="200" y="367" text-anchor="middle" font-family="'Trebuchet MS', sans-serif" font-size="11" fill="#2dd4bf" letter-spacing="6">AI RECEPTIONIST</text>
</svg>