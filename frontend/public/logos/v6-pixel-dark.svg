<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Pixel - Dark mode -->
  <rect width="400" height="400" rx="20" fill="#0f172a"/>
  <defs>
    <filter id="pxdgl">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g transform="translate(95, 40)" filter="url(#pxdgl)">
    <!-- Row 1 -->
    <rect x="60" y="0" width="20" height="20" rx="3" fill="#a5b4fc" opacity="0.5"/>
    <rect x="85" y="0" width="20" height="20" rx="3" fill="#818cf8" opacity="0.7"/>
    <rect x="110" y="0" width="20" height="20" rx="3" fill="#818cf8" opacity="0.8"/>
    <rect x="135" y="0" width="20" height="20" rx="3" fill="#a5b4fc" opacity="0.6"/>
    <!-- Row 2 -->
    <rect x="30" y="25" width="20" height="20" rx="3" fill="#818cf8" opacity="0.7"/>
    <rect x="55" y="25" width="20" height="20" rx="3" fill="#6366f1"/>
    <rect x="130" y="25" width="20" height="20" rx="3" fill="#6366f1"/>
    <rect x="155" y="25" width="20" height="20" rx="3" fill="#818cf8" opacity="0.7"/>
    <!-- Row 3 -->
    <rect x="5" y="50" width="20" height="20" rx="3" fill="#818cf8" opacity="0.8"/>
    <rect x="30" y="50" width="20" height="20" rx="3" fill="#6366f1"/>
    <rect x="155" y="50" width="20" height="20" rx="3" fill="#6366f1"/>
    <rect x="180" y="50" width="20" height="20" rx="3" fill="#818cf8" opacity="0.8"/>
    <!-- Row 4 -->
    <rect x="0" y="75" width="20" height="20" rx="3" fill="#6366f1"/>
    <rect x="185" y="75" width="20" height="20" rx="3" fill="#8b5cf6"/>
    <!-- Row 5 -->
    <rect x="0" y="100" width="20" height="20" rx="3" fill="#6366f1"/>
    <rect x="185" y="100" width="20" height="20" rx="3" fill="#a78bfa"/>
    <!-- Row 6 -->
    <rect x="0" y="125" width="20" height="20" rx="3" fill="#6366f1"/>
    <rect x="185" y="125" width="20" height="20" rx="3" fill="#a78bfa"/>
    <!-- Row 7 -->
    <rect x="5" y="150" width="20" height="20" rx="3" fill="#818cf8" opacity="0.8"/>
    <rect x="30" y="150" width="20" height="20" rx="3" fill="#6366f1"/>
    <rect x="155" y="150" width="20" height="20" rx="3" fill="#a78bfa"/>
    <rect x="180" y="150" width="20" height="20" rx="3" fill="#c4b5fd" opacity="0.8"/>
    <!-- Row 8 -->
    <rect x="30" y="175" width="20" height="20" rx="3" fill="#818cf8" opacity="0.7"/>
    <rect x="55" y="175" width="20" height="20" rx="3" fill="#6366f1"/>
    <rect x="130" y="175" width="20" height="20" rx="3" fill="#a78bfa"/>
    <rect x="155" y="175" width="20" height="20" rx="3" fill="#c4b5fd" opacity="0.7"/>
    <!-- Row 9 + tail -->
    <rect x="60" y="200" width="20" height="20" rx="3" fill="#a5b4fc" opacity="0.5"/>
    <rect x="85" y="200" width="20" height="20" rx="3" fill="#818cf8" opacity="0.7"/>
    <rect x="110" y="200" width="20" height="20" rx="3" fill="#a78bfa" opacity="0.8"/>
    <rect x="135" y="200" width="20" height="20" rx="3" fill="#c4b5fd" opacity="0.6"/>
    <rect x="165" y="200" width="20" height="20" rx="3" fill="#c084fc"/>
    <!-- Tail -->
    <rect x="190" y="225" width="20" height="20" rx="3" fill="#d8b4fe" opacity="0.9"/>
    <rect x="215" y="250" width="20" height="20" rx="3" fill="#d8b4fe" opacity="0.7"/>
  </g>
  <text x="200" y="365" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="40" font-weight="700" fill="#e0e7ff" letter-spacing="4">Qwillio</text>
</svg>