<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- 06: MICROPHONE — Micro studio stylisé avec ondes -->
  <defs>
    <linearGradient id="f1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <!-- Capsule du micro -->
  <rect x="172" y="65" width="56" height="95" rx="28" fill="url(#f1)"/>
  <!-- Grille du micro (lignes horizontales) -->
  <line x1="182" y1="85" x2="218" y2="85" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="182" y1="95" x2="218" y2="95" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="182" y1="105" x2="218" y2="105" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="182" y1="115" x2="218" y2="115" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="182" y1="125" x2="218" y2="125" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="182" y1="135" x2="218" y2="135" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <!-- Bras du micro (arc en U) -->
  <path d="M148 115 C148 195 200 215 252 115" fill="none" stroke="#92400e" stroke-width="8" stroke-linecap="round"/>
  <!-- Tige -->
  <line x1="200" y1="210" x2="200" y2="265" stroke="#92400e" stroke-width="8" stroke-linecap="round"/>
  <!-- Socle -->
  <ellipse cx="200" cy="272" rx="42" ry="10" fill="#92400e"/>
  <!-- Ondes de chaque côté -->
  <path d="M140 90 C128 102 128 128 140 140" fill="none" stroke="#f59e0b" stroke-width="3.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M122 78 C105 98 105 138 122 158" fill="none" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
  <path d="M260 90 C272 102 272 128 260 140" fill="none" stroke="#f59e0b" stroke-width="3.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M278 78 C295 98 295 138 278 158" fill="none" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
  <!-- Wordmark -->
  <text x="200" y="345" text-anchor="middle" font-family="'Palatino Linotype', serif" font-size="50" font-weight="700" fill="#78350f" letter-spacing="2">Qwillio</text>
</svg>