    <rect x="-3" y="-105" width="6" height="48" rx="3" fill="url(#v415a)" transform="rotate(40)"/>
    <rect x="-3" y="-110" width="6" height="58" rx="3" fill="url(#v415a)" transform="rotate(50)"/>
