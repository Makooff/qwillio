    <rect x="-3" y="-98" width="6" height="28" rx="3" fill="url(#v415a)" transform="rotate(120)"/>
    <rect x="-3" y="-95" width="6" height="20" rx="3" fill="url(#v415a)" transform="rotate(130)" opacity="0.7"/>
    <rect x="-3" y="-97" width="6" height="26" rx="3" fill="url(#v415a)" transform="rotate(140)" opacity="0.8"/>
    <rect x="-3" y="-102" width="6" height="38" rx="3" fill="url(#v415a)" transform="rotate(150)"/>
    <rect x="-3" y="-110" width="6" height="55" rx="3" fill="url(#v415a)" transform="rotate(160)"/>
    <rect x="-3" y="-108" width="6" height="50" rx="3" fill="url(#v415a)" transform="rotate(170)"/>
