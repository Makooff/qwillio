    <rect x="-3" y="-105" width="6" height="45" rx="3" fill="url(#v415a)" transform="rotate(210)"/>
    <rect x="-3" y="-112" width="6" height="60" rx="3" fill="url(#v415a)" transform="rotate(220)"/>
    <rect x="-3" y="-107" width="6" height="48" rx="3" fill="url(#v415a)" transform="rotate(230)"/>
    <rect x="-3" y="-100" width="6" height="32" rx="3" fill="url(#v415a)" transform="rotate(240)"/>
