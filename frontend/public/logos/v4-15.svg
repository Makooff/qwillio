<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- 15: CIRCULAR WAVEFORM — Audio waveform arranged in a circle -->
  <defs>
    <linearGradient id="v415a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>
  <!-- Waveform bars arranged radially around circle -->
  <g transform="translate(195, 165)">
    <!-- 36 bars at 10° intervals, heights vary to create waveform pattern -->
    <rect x="-3" y="-95" width="6" height="22" rx="3" fill="url(#v415a)" transform="rotate(0)" opacity="0.7"/>
    <rect x="-3" y="-98" width="6" height="30" rx="3" fill="url(#v415a)" transform="rotate(10)"/>
