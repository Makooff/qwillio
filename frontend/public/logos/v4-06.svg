<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- 06: BRUTALIST BLOCK — Heavy geometric slab, industrial feel -->
  <rect width="400" height="400" fill="#f5f0e8"/>
  <!-- Giant Q as architecture -->
  <rect x="70" y="40" width="200" height="240" fill="#1a1a1a"/>
  <!-- Q inner cut -->
  <rect x="120" y="90" width="100" height="140" fill="#f5f0e8"/>
  <!-- Q tail — heavy diagonal block -->
  <rect x="200" y="210" width="130" height="50" fill="#1a1a1a" transform="rotate(35, 265, 235)"/>
  <!-- Wordmark — tight, heavy caps -->
  <text x="200" y="355" text-anchor="middle" font-family="'Impact', 'Arial Black', sans-serif" font-size="58" font-weight="900" fill="#1a1a1a" letter-spacing="-1">QWILLIO</text>
  <!-- Red accent bar -->
  <rect x="70" y="370" width="260" height="5" fill="#e63946"/>
</svg>