<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- 08: NEGATIVE SPACE — The Q is revealed in the space between shapes -->
  <defs>
    <linearGradient id="v408a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <mask id="v408mask">
      <rect width="400" height="330" fill="white"/>
      <!-- Q shape carved out -->
      <circle cx="190" cy="160" r="88" fill="black"/>
      <circle cx="190" cy="160" r="42" fill="white"/>
      <line x1="252" y1="222" x2="298" y2="268" stroke="black" stroke-width="28" stroke-linecap="round"/>
    </mask>
  </defs>
  <!-- Background with Q negative space -->
  <rect x="30" y="25" width="340" height="280" rx="16" fill="url(#v408a)" mask="url(#v408mask)"/>
  <!-- Tiny decorative dots around the Q space -->
  <circle cx="105" cy="75" r="2" fill="#f59e0b"/>
  <circle cx="275" cy="85" r="2" fill="#f59e0b"/>
  <circle cx="310" cy="190" r="2" fill="#f59e0b"/>
  <circle cx="85" cy="240" r="2" fill="#f59e0b"/>
  <!-- Wordmark -->
  <text x="200" y="365" text-anchor="middle" font-family="'Lucida Console', 'Menlo', monospace" font-size="36" font-weight="400" fill="#1e293b" letter-spacing="8">QWILLIO</text>
</svg>