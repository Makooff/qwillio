<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- 19: GRADIENT STENCIL — Bold stencil-cut Q with vivid gradient -->
  <defs>
    <linearGradient id="v419a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="33%" stop-color="#e11d48"/>
      <stop offset="66%" stop-color="#be123c"/>
      <stop offset="100%" stop-color="#9f1239"/>
    </linearGradient>
  </defs>
  <!-- Stencil Q — bold with horizontal stencil bridge -->
  <circle cx="185" cy="160" r="105" fill="url(#v419a)"/>
  <!-- Inner cutout -->
  <circle cx="185" cy="160" r="52" fill="white"/>
  <!-- Stencil bridge (horizontal bar connecting inner/outer) — characteristic of stencil fonts -->
  <rect x="130" y="152" width="110" height="16" fill="white"/>
  <!-- Q tail — heavy block -->
  <line x1="255" y1="232" x2="310" y2="287" stroke="url(#v419a)" stroke-width="36" stroke-linecap="round"/>
  <!-- Wordmark -->
  <text x="200" y="365" text-anchor="middle" font-family="'Impact', 'Arial Black', sans-serif" font-size="52" font-weight="900" fill="#9f1239" letter-spacing="2">QWILLIO</text>
</svg>