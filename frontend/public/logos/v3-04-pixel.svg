<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- V3-04: PIXEL - Q formé par des carrés/pixels -->
  <!-- Grille de pixels formant un Q -->
  <g transform="translate(95, 40)">
    <!-- Rangée 1 (haut du cercle) -->
    <rect x="60" y="0" width="20" height="20" rx="3" fill="#818cf8" opacity="0.5"/>
    <rect x="85" y="0" width="20" height="20" rx="3" fill="#6366f1" opacity="0.7"/>
    <rect x="110" y="0" width="20" height="20" rx="3" fill="#6366f1" opacity="0.8"/>
    <rect x="135" y="0" width="20" height="20" rx="3" fill="#818cf8" opacity="0.6"/>
    <!-- Rangée 2 -->
    <rect x="30" y="25" width="20" height="20" rx="3" fill="#6366f1" opacity="0.7"/>
    <rect x="55" y="25" width="20" height="20" rx="3" fill="#4f46e5"/>
    <rect x="130" y="25" width="20" height="20" rx="3" fill="#4f46e5"/>
    <rect x="155" y="25" width="20" height="20" rx="3" fill="#6366f1" opacity="0.7"/>
    <!-- Rangée 3 -->
    <rect x="5" y="50" width="20" height="20" rx="3" fill="#6366f1" opacity="0.8"/>
    <rect x="30" y="50" width="20" height="20" rx="3" fill="#4f46e5"/>
    <rect x="155" y="50" width="20" height="20" rx="3" fill="#4f46e5"/>
    <rect x="180" y="50" width="20" height="20" rx="3" fill="#6366f1" opacity="0.8"/>
    <!-- Rangée 4 -->
    <rect x="0" y="75" width="20" height="20" rx="3" fill="#4f46e5"/>
    <rect x="185" y="75" width="20" height="20" rx="3" fill="#4f46e5"/>
    <!-- Rangée 5 (milieu) -->
    <rect x="0" y="100" width="20" height="20" rx="3" fill="#4f46e5"/>
    <rect x="185" y="100" width="20" height="20" rx="3" fill="#7c3aed"/>
    <!-- Rangée 6 -->
    <rect x="0" y="125" width="20" height="20" rx="3" fill="#4f46e5"/>
    <rect x="185" y="125" width="20" height="20" rx="3" fill="#7c3aed"/>
    <!-- Rangée 7 -->
    <rect x="5" y="150" width="20" height="20" rx="3" fill="#6366f1" opacity="0.8"/>
    <rect x="30" y="150" width="20" height="20" rx="3" fill="#4f46e5"/>
    <rect x="155" y="150" width="20" height="20" rx="3" fill="#7c3aed"/>
    <rect x="180" y="150" width="20" height="20" rx="3" fill="#7c3aed" opacity="0.8"/>
    <!-- Rangée 8 -->
    <rect x="30" y="175" width="20" height="20" rx="3" fill="#6366f1" opacity="0.7"/>
    <rect x="55" y="175" width="20" height="20" rx="3" fill="#4f46e5"/>
    <rect x="130" y="175" width="20" height="20" rx="3" fill="#7c3aed"/>
    <rect x="155" y="175" width="20" height="20" rx="3" fill="#7c3aed" opacity="0.7"/>
    <!-- Rangée 9 (bas + queue) -->
    <rect x="60" y="200" width="20" height="20" rx="3" fill="#818cf8" opacity="0.5"/>
    <rect x="85" y="200" width="20" height="20" rx="3" fill="#6366f1" opacity="0.7"/>
    <rect x="110" y="200" width="20" height="20" rx="3" fill="#7c3aed" opacity="0.8"/>
    <rect x="135" y="200" width="20" height="20" rx="3" fill="#818cf8" opacity="0.6"/>
    <rect x="165" y="200" width="20" height="20" rx="3" fill="#8b5cf6"/>
    <!-- Queue du Q -->
    <rect x="190" y="225" width="20" height="20" rx="3" fill="#a855f7" opacity="0.9"/>
    <rect x="215" y="250" width="20" height="20" rx="3" fill="#a855f7" opacity="0.7"/>
  </g>
  <!-- Wordmark -->
  <text x="200" y="365" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="40" font-weight="700" fill="#312e81" letter-spacing="4">Qwillio</text>
</svg>