<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Logo 10: Double Q/W imbriqué avec dégradé split -->
  <defs>
    <linearGradient id="g10a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="g10b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <clipPath id="leftHalf">
      <rect x="0" y="0" width="200" height="400"/>
    </clipPath>
    <clipPath id="rightHalf">
      <rect x="200" y="0" width="200" height="400"/>
    </clipPath>
  </defs>
  <!-- Fond cercle gauche (indigo) -->
  <circle cx="155" cy="160" r="100" fill="url(#g10a)"/>
  <!-- Fond cercle droit (violet) -->
  <circle cx="245" cy="160" r="100" fill="url(#g10b)"/>
  <!-- Zone d'intersection - plus foncée -->
  <clipPath id="intersect">
    <circle cx="155" cy="160" r="100"/>
  </clipPath>
  <circle cx="245" cy="160" r="100" fill="#4338ca" opacity="0.5" clip-path="url(#intersect)"/>
  <!-- Q dans le cercle gauche -->
  <text x="155" y="185" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="90" font-weight="800" fill="white" opacity="0.9">Q</text>
  <!-- W dans le cercle droit -->
  <text x="245" y="185" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="80" font-weight="800" fill="white" opacity="0.9">W</text>
  <!-- Texte principal -->
  <text x="200" y="330" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="50" font-weight="700" fill="#1e1b4b" letter-spacing="3">Qwillio</text>
  <!-- Ligne décorative -->
  <line x1="100" y1="345" x2="300" y2="345" stroke="url(#g10a)" stroke-width="2" opacity="0.4"/>
  <!-- Sous-titre -->
  <text x="200" y="375" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="500" fill="#6366f1" letter-spacing="7">VOICE AI PLATFORM</text>
</svg>