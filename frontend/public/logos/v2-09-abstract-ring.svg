<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- V2-09: Abstract Ring - Q outline avec cercle plein décalé derrière -->
  <defs>
    <linearGradient id="v9a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1" />
      <stop offset="100%" style="stop-color:#8b5cf6" />
    </linearGradient>
    <linearGradient id="v9b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:0.35" />
    </linearGradient>
  </defs>
  <!-- Cercle plein décalé (arrière-plan, semi-transparent) -->
  <circle cx="225" cy="185" r="72" fill="url(#v9b)"/>
  <!-- Q anneau principal -->
  <circle cx="180" cy="155" r="90" fill="none" stroke="url(#v9a)" stroke-width="24"/>
  <!-- Queue du Q : bord extérieur (180+90*0.707, 155+90*0.707) = (244, 219) -->
  <line x1="244" y1="219" x2="295" y2="270" stroke="url(#v9a)" stroke-width="24" stroke-linecap="round"/>
  <!-- Wordmark -->
  <text x="200" y="350" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="48" font-weight="700" fill="#1e1b4b" letter-spacing="4">Qwillio</text>
  <text x="200" y="380" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600" fill="#8b5cf6" letter-spacing="6">AI RECEPTIONIST</text>
</svg>