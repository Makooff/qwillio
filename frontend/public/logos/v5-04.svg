  <path d="M255 98 C278 82 278 55 255 40" fill="none" stroke="url(#d2)" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M270 105 C300 85 300 48 270 28" fill="none" stroke="url(#d2)" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
