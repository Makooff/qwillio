  <circle cx="200" cy="165" r="10" fill="url(#d2)" opacity="0.2"/>
  <!-- Wordmark -->
  <text x="200" y="330" text-anchor="middle" font-family="'Verdana', sans-serif" font-size="46" font-weight="700" fill="#0f172a" letter-spacing="3">Qwillio</text>
  <text x="200" y="362" text-anchor="middle" font-family="'Verdana', sans-serif" font-size="11" fill="#0ea5e9" letter-spacing="6">SMART VOICE AI</text>
