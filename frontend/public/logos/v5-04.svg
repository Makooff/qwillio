  </defs>
  <!-- Combiné téléphonique vertical stylisé -->
  <path d="M170 80 C170 65 185 55 200 55 C215 55 230 65 230 80 L230 115 C230 125 222 130 215 130 L185 130 C178 130 170 125 170 115 Z" fill="url(#d1)"/>
  <rect x="188" y="130" width="24" height="100" rx="4" fill="url(#d1)"/>
  <path d="M170 230 C170 245 185 255 200 255 C215 255 230 245 230 230 L230 215 C230 205 222 200 215 200 L185 200 C178 200 170 205 170 215 Z" fill="url(#d1)"/>
