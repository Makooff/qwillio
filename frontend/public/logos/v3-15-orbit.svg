<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- V3-15: ORBIT - Q avec orbites elliptiques (planétaire) -->
  <defs>
    <linearGradient id="ob1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4338ca"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
  </defs>
  <!-- Orbites elliptiques -->
  <ellipse cx="195" cy="170" rx="145" ry="50" fill="none" stroke="#c7d2fe" stroke-width="2" transform="rotate(-30, 195, 170)"/>
  <ellipse cx="195" cy="170" rx="145" ry="50" fill="none" stroke="#e0e7ff" stroke-width="1.5" transform="rotate(30, 195, 170)"/>
  <ellipse cx="195" cy="170" rx="145" ry="50" fill="none" stroke="#ddd6fe" stroke-width="1.5" transform="rotate(90, 195, 170)"/>
  <!-- Corps central du Q (planète) -->
  <circle cx="195" cy="170" r="55" fill="url(#ob1)"/>
  <!-- Lettre Q dans la planète -->
  <circle cx="192" cy="166" r="22" fill="none" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <line x1="208" y1="182" x2="222" y2="196" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <!-- Satellites sur les orbites -->
  <circle cx="85" cy="85" r="6" fill="#6366f1"/>
  <circle cx="320" cy="120" r="4" fill="#8b5cf6"/>
  <circle cx="110" cy="270" r="5" fill="#a78bfa"/>
  <!-- Wordmark -->
  <text x="200" y="355" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="48" font-weight="700" fill="#1e1b4b" letter-spacing="3">Qwillio</text>
</svg>