<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- 20: ECOSYSTEM RINGS — Interlocking orbital rings suggesting connectivity -->
  <defs>
    <linearGradient id="v420a" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="v420b" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="v420c" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <!-- Three interlocking rings forming Q shape -->
  <!-- Ring 1 — horizontal ellipse -->
  <ellipse cx="190" cy="165" rx="115" ry="48" fill="none" stroke="url(#v420a)" stroke-width="7" transform="rotate(-15, 190, 165)"/>
  <!-- Ring 2 — tilted ellipse -->
  <ellipse cx="190" cy="165" rx="115" ry="48" fill="none" stroke="url(#v420b)" stroke-width="7" transform="rotate(45, 190, 165)"/>
  <!-- Ring 3 — opposite tilt -->
  <ellipse cx="190" cy="165" rx="115" ry="48" fill="none" stroke="url(#v420c)" stroke-width="7" transform="rotate(-75, 190, 165)"/>
  <!-- Center nucleus -->
  <circle cx="190" cy="165" r="18" fill="#1e1b4b"/>
  <circle cx="190" cy="165" r="8" fill="white"/>
  <!-- Q tail extending from the ring system -->
  <line x1="260" y1="235" x2="310" y2="285" stroke="#1d4ed8" stroke-width="7" stroke-linecap="round"/>
  <!-- Node dots at ring intersections -->
  <circle cx="100" cy="98" r="5" fill="#3b82f6"/>
  <circle cx="282" cy="110" r="5" fill="#a78bfa"/>
  <circle cx="120" cy="238" r="5" fill="#22d3ee"/>
  <circle cx="275" cy="215" r="5" fill="#7c3aed"/>
  <circle cx="190" cy="60" r="4" fill="#0891b2"/>
  <!-- Wordmark -->
  <text x="200" y="355" text-anchor="middle" font-family="'Trebuchet MS', 'Gill Sans', sans-serif" font-size="42" font-weight="700" fill="#1e1b4b" letter-spacing="4">Qwillio</text>
  <text x="200" y="382" text-anchor="middle" font-family="'Trebuchet MS', sans-serif" font-size="11" font-weight="400" fill="#6366f1" letter-spacing="6">CONNECTED INTELLIGENCE</text>
</svg>