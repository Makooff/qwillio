<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- V3-13: SUNRISE - Demi-Q qui monte comme un soleil -->
  <defs>
    <linearGradient id="sr1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <clipPath id="horizon">
      <rect x="0" y="0" width="400" height="210"/>
    </clipPath>
  </defs>
  <!-- Ligne d'horizon -->
  <line x1="50" y1="210" x2="350" y2="210" stroke="#c7d2fe" stroke-width="3"/>
  <!-- Rayons -->
  <line x1="200" y1="210" x2="200" y2="50" stroke="#e0e7ff" stroke-width="2"/>
  <line x1="200" y1="210" x2="100" y2="70" stroke="#e0e7ff" stroke-width="2"/>
  <line x1="200" y1="210" x2="300" y2="70" stroke="#e0e7ff" stroke-width="2"/>
  <line x1="200" y1="210" x2="60" y2="140" stroke="#e0e7ff" stroke-width="2"/>
  <line x1="200" y1="210" x2="340" y2="140" stroke="#e0e7ff" stroke-width="2"/>
  <!-- Demi-cercle (Q montant) -->
  <g clip-path="url(#horizon)">
    <circle cx="200" cy="210" r="100" fill="url(#sr1)"/>
    <circle cx="200" cy="210" r="42" fill="white"/>
  </g>
  <!-- Queue du Q visible sous l'horizon -->
  <line x1="270" y1="210" x2="310" y2="250" stroke="#7c3aed" stroke-width="20" stroke-linecap="round"/>
  <!-- Wordmark -->
  <text x="200" y="335" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="52" font-weight="800" fill="#312e81" letter-spacing="4">Qwillio</text>
  <text x="200" y="365" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="500" fill="#6366f1" letter-spacing="7">A NEW ERA OF AI</text>
</svg>