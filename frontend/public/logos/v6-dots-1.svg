    <line x1="310" y1="230" x2="265" y2="280"/><line x1="90" y1="230" x2="135" y2="280"/>
    <line x1="265" y1="280" x2="200" y2="295"/><line x1="135" y1="280" x2="200" y2="295"/>
    <line x1="200" y1="170" x2="200" y2="55"/><line x1="200" y1="170" x2="280" y2="90"/>
    <line x1="200" y1="170" x2="120" y2="90"/><line x1="200" y1="170" x2="320" y2="155"/>
    <line x1="200" y1="170" x2="80" y2="155"/><line x1="200" y1="170" x2="310" y2="230"/>
    <line x1="200" y1="170" x2="90" y2="230"/><line x1="200" y1="170" x2="265" y2="280"/>
    <line x1="200" y1="170" x2="135" y2="280"/><line x1="200" y1="170" x2="200" y2="295"/>
    <line x1="120" y1="90" x2="80" y2="155"/><line x1="280" y1="90" x2="320" y2="155"/>
    <line x1="80" y1="155" x2="120" y2="90"/><line x1="120" y1="90" x2="280" y2="90"/>
  </g>
  <circle cx="200" cy="55" r="8" fill="url(#dt1)"/>
  <circle cx="280" cy="90" r="7" fill="#14b8a6"/>
  <circle cx="120" cy="90" r="7" fill="#14b8a6"/>
  <circle cx="320" cy="155" r="6" fill="#2dd4bf"/>
