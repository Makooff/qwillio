<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- 20: POWER BUTTON — Bouton power stylisé = allumer votre receptionniste IA -->
  <defs>
    <linearGradient id="t1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="t_gl">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Fond sombre circulaire -->
  <circle cx="200" cy="155" r="110" fill="#0a0a0a"/>
  <circle cx="200" cy="155" r="108" fill="none" stroke="#1a1a1a" stroke-width="3"/>
  <!-- Anneau du bouton power -->
  <path d="M145 100 C110 130 95 170 100 210 C110 270 150 300 200 300 C250 300 290 270 300 210 C305 170 290 130 255 100" fill="none" stroke="url(#t1)" stroke-width="12" stroke-linecap="round" filter="url(#t_gl)"/>
  <!-- Ligne verticale du power -->
  <line x1="200" y1="75" x2="200" y2="170" stroke="url(#t1)" stroke-width="12" stroke-linecap="round" filter="url(#t_gl)"/>
  <!-- Glow subtil au centre -->
  <circle cx="200" cy="155" r="25" fill="#22c55e" opacity="0.06"/>
  <!-- Wordmark -->
  <text x="200" y="340" text-anchor="middle" font-family="'Verdana', sans-serif" font-size="48" font-weight="700" fill="#0a0a0a" letter-spacing="3">Qwillio</text>
  <text x="200" y="372" text-anchor="middle" font-family="'Verdana', sans-serif" font-size="11" fill="#16a34a" letter-spacing="6">POWER ON YOUR AI</text>
</svg>