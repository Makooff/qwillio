<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- 01: SPEECH BUBBLE Q — The Q itself IS a speech bubble -->
  <defs>
    <linearGradient id="v401a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
  </defs>
  <!-- Q body as speech bubble -->
  <circle cx="185" cy="148" r="100" fill="url(#v401a)"/>
  <!-- Speech bubble tail (doubles as Q tail) -->
  <path d="M245 220 L300 285 L220 235" fill="url(#v401a)"/>
  <!-- Inner cutout circle (the Q hole) -->
  <circle cx="185" cy="148" r="45" fill="white"/>
  <!-- Sound wave lines inside the hole -->
  <line x1="170" y1="135" x2="170" y2="161" stroke="#0d9488" stroke-width="4" stroke-linecap="round"/>
  <line x1="180" y1="128" x2="180" y2="168" stroke="#0d9488" stroke-width="4" stroke-linecap="round"/>
  <line x1="190" y1="133" x2="190" y2="163" stroke="#0d9488" stroke-width="4" stroke-linecap="round"/>
  <line x1="200" y1="138" x2="200" y2="158" stroke="#0d9488" stroke-width="4" stroke-linecap="round"/>
  <!-- Wordmark -->
  <text x="200" y="365" text-anchor="middle" font-family="'Georgia', 'Times New Roman', serif" font-size="48" font-weight="700" fill="#134e4a" letter-spacing="3">Qwillio</text>
</svg>