<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- 12: LIQUID METAL — Chrome/mercury reflective Q -->
  <defs>
    <linearGradient id="v412a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="20%" stop-color="#94a3b8"/>
      <stop offset="40%" stop-color="#f1f5f9"/>
      <stop offset="55%" stop-color="#64748b"/>
      <stop offset="70%" stop-color="#cbd5e1"/>
      <stop offset="85%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="v412b" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="50%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <filter id="v412chrome">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.5"/>
    </filter>
  </defs>
  <!-- Chrome Q ring -->
  <circle cx="190" cy="158" r="95" fill="url(#v412a)" filter="url(#v412chrome)"/>
  <circle cx="190" cy="158" r="68" fill="url(#v412b)"/>
  <circle cx="190" cy="158" r="45" fill="white"/>
  <!-- Specular highlight -->
  <ellipse cx="162" cy="118" rx="38" ry="18" fill="white" opacity="0.6" transform="rotate(-25, 162, 118)"/>
  <!-- Chrome Q tail -->
  <line x1="256" y1="224" x2="305" y2="273" stroke="url(#v412a)" stroke-width="30" stroke-linecap="round" filter="url(#v412chrome)"/>
  <!-- Highlight on tail -->
  <line x1="260" y1="220" x2="296" y2="256" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
  <!-- Wordmark with metallic look -->
  <text x="200" y="360" text-anchor="middle" font-family="'Garamond', 'Times New Roman', serif" font-size="50" font-weight="400" fill="url(#v412a)" letter-spacing="5">Qwillio</text>
</svg>