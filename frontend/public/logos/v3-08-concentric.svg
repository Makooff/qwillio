<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- V3-08: CONCENTRIC - Cercles concentriques formant un Q -->
  <!-- Cercles concentriques -->
  <circle cx="190" cy="165" r="120" fill="none" stroke="#e0e7ff" stroke-width="4"/>
  <circle cx="190" cy="165" r="100" fill="none" stroke="#c7d2fe" stroke-width="5"/>
  <circle cx="190" cy="165" r="80" fill="none" stroke="#a5b4fc" stroke-width="6"/>
  <circle cx="190" cy="165" r="60" fill="none" stroke="#818cf8" stroke-width="8"/>
  <circle cx="190" cy="165" r="40" fill="none" stroke="#6366f1" stroke-width="10"/>
  <!-- Centre plein -->
  <circle cx="190" cy="165" r="18" fill="#4f46e5"/>
  <!-- Queue du Q traversant les cercles -->
  <line x1="232" y1="207" x2="310" y2="285" stroke="#4f46e5" stroke-width="10" stroke-linecap="round"/>
  <!-- Points aux intersections queue/cercles -->
  <circle cx="248" cy="223" r="5" fill="#6366f1"/>
  <circle cx="262" cy="237" r="5" fill="#818cf8"/>
  <circle cx="276" cy="251" r="5" fill="#a5b4fc"/>
  <circle cx="290" cy="265" r="5" fill="#c7d2fe"/>
  <!-- Wordmark -->
  <text x="200" y="360" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="46" font-weight="600" fill="#1e1b4b" letter-spacing="5">Qwillio</text>
</svg>