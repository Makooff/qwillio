<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Logo 1: Monogramme Q stylisé avec onde sonore -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad1b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Cercle Q -->
  <circle cx="180" cy="180" r="100" fill="none" stroke="url(#grad1)" stroke-width="28" stroke-linecap="round"/>
  <!-- Queue du Q - diagonale -->
  <line x1="245" y1="245" x2="300" y2="300" stroke="url(#grad1b)" stroke-width="28" stroke-linecap="round"/>
  <!-- Ondes sonores à droite du Q -->
  <path d="M290 140 Q310 180 290 220" fill="none" stroke="#6366f1" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <path d="M315 120 Q345 180 315 240" fill="none" stroke="#818cf8" stroke-width="7" stroke-linecap="round" opacity="0.5"/>
  <path d="M340 100 Q380 180 340 260" fill="none" stroke="#a78bfa" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
  <!-- Texte -->
  <text x="200" y="370" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="42" font-weight="700" fill="#1e1b4b" letter-spacing="6">QWILLIO</text>
</svg>