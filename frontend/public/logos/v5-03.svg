<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- 03: PHONE HEADSET — Casque téléphonique stylisé minimaliste -->
  <defs>
    <linearGradient id="c1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <!-- Arc du casque -->
  <path d="M110 195 C110 110 150 60 200 60 C250 60 290 110 290 195" fill="none" stroke="url(#c1)" stroke-width="14" stroke-linecap="round"/>
  <!-- Écouteur gauche -->
  <rect x="90" y="175" width="35" height="60" rx="12" fill="url(#c1)"/>
  <!-- Écouteur droit -->
  <rect x="275" y="175" width="35" height="60" rx="12" fill="url(#c1)"/>
  <!-- Micro (tige + capsule) -->
  <path d="M275 220 C275 220 260 240 240 260 L230 275" fill="none" stroke="url(#c1)" stroke-width="8" stroke-linecap="round"/>
  <circle cx="225" cy="282" r="14" fill="url(#c1)"/>
  <!-- Ondes sortant du micro -->
  <path d="M208 275 C200 268 200 258 208 250" fill="none" stroke="#a855f7" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <path d="M198 280 C186 270 186 255 198 245" fill="none" stroke="#a855f7" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
  <!-- Wordmark -->
  <text x="200" y="355" text-anchor="middle" font-family="'Trebuchet MS', sans-serif" font-size="48" font-weight="700" fill="#4c1d95" letter-spacing="3">Qwillio</text>
</svg>