    <line x1="140" y1="270" x2="200" y2="285"/>
    <line x1="200" y1="65" x2="200" y2="175"/>
    <line x1="130" y1="125" x2="290" y2="110"/>
    <line x1="100" y1="200" x2="310" y2="195"/>
    <line x1="200" y1="175" x2="290" y2="110"/>
    <line x1="200" y1="175" x2="130" y2="125"/>
    <line x1="200" y1="175" x2="310" y2="195"/>
