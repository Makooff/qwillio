  <circle cx="290" cy="110" r="8" fill="#14b8a6"/>
  <circle cx="130" cy="125" r="8" fill="#14b8a6"/>
  <circle cx="310" cy="195" r="7" fill="#2dd4bf"/>
  <circle cx="100" cy="200" r="7" fill="#2dd4bf"/>
  <circle cx="280" cy="265" r="8" fill="#14b8a6"/>
  <circle cx="140" cy="270" r="8" fill="#14b8a6"/>
  <circle cx="200" cy="285" r="9" fill="url(#s1)"/>
  <!-- Nœud central (le hub IA) — plus grand -->
  <circle cx="200" cy="175" r="16" fill="url(#s1)"/>
  <circle cx="200" cy="175" r="7" fill="white"/>
  <!-- Wordmark -->
  <text x="200" y="355" text-anchor="middle" font-family="'Trebuchet MS', sans-serif" font-size="48" font-weight="700" fill="#134e4a" letter-spacing="3">Qwillio</text>
