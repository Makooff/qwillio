  </defs>
  <!-- Brush stroke Q — thick calligraphic arc -->
  <path d="M175 60 C90 60 45 120 45 180 C45 260 110 300 185 300 C260 300 320 260 320 185 C320 128 290 82 240 65" fill="none" stroke="url(#v417a)" stroke-width="32" stroke-linecap="round"/>
