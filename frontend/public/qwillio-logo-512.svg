<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 660" width="860" height="660">
  <defs>
    <linearGradient id="gradLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6b74f0"/>
      <stop offset="100%" stop-color="#5b63e8"/>
    </linearGradient>
    <linearGradient id="gradRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9b6ef5"/>
      <stop offset="100%" stop-color="#b060f0"/>
    </linearGradient>
    <clipPath id="leftClip">
      <circle cx="305" cy="330" r="272"/>
    </clipPath>
    <clipPath id="rightClip">
      <circle cx="555" cy="330" r="272"/>
    </clipPath>
  </defs>

  <!-- White background -->
  <rect width="860" height="660" fill="white"/>

  <!-- Left circle (blue-indigo) -->
  <circle cx="305" cy="330" r="272" fill="url(#gradLeft)"/>

  <!-- Right circle (violet-purple) -->
  <circle cx="555" cy="330" r="272" fill="url(#gradRight)"/>

  <!-- Overlap blend: right circle clipped to left circle area -->
  <circle cx="555" cy="330" r="272" fill="#7c5ce8" opacity="0.55" clip-path="url(#leftClip)"/>

  <!-- Q letter -->
  <text
    x="282"
    y="382"
    text-anchor="middle"
    font-family="'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
    font-size="195"
    font-weight="800"
    fill="white"
    opacity="0.97"
    letter-spacing="-4"
  >Q</text>

  <!-- W letter -->
  <text
    x="558"
    y="382"
    text-anchor="middle"
    font-family="'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
    font-size="172"
    font-weight="800"
    fill="white"
    opacity="0.97"
    letter-spacing="-4"
  >W</text>
</svg>
